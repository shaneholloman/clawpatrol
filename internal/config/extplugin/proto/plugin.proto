// Plugin protocol v1 for clawpatrol's Terraform-style external plugins.
//
// One subprocess per plugin source. The gateway spawns the subprocess
// via hashicorp/go-plugin, fetches its Manifest, and registers virtual
// *config.Plugin entries for each declared (credential / tunnel /
// endpoint) type. At request time the gateway hands inbound conns to
// the plugin over the HandleConn bidi stream; endpoints that need an
// upstream connection through a tunnel go through Dial.
//
// The plugin is responsible for parsing whatever protocol rides on
// the bytes it receives. The gateway only optionally terminates TLS
// before handing the bytes over.

syntax = "proto3";

package clawpatrol.plugin.v1;

option go_package = "github.com/denoland/clawpatrol/config/extplugin/proto;extpluginpb";

// =====================================================================
// Manifest + Build
// =====================================================================

service Plugin {
  // Manifest is called once on plugin startup. The plugin reports the
  // credential / tunnel / endpoint types it provides plus their HCL
  // schemas. The gateway converts each entry into a virtual
  // *config.Plugin and registers it.
  rpc Manifest(ManifestRequest) returns (ManifestResponse);

  // Build is called once per HCL block during config load. The gateway
  // sends the decoded block body as a JSON object; the plugin
  // validates, normalizes, and returns canonical JSON that round-trips
  // back to the plugin in ConnInit / OpenTunnelRequest. Diagnostics
  // are reported back to the user with the block's source range.
  rpc Build(BuildRequest) returns (BuildResponse);
}

message ManifestRequest {}

message ManifestResponse {
  string name = 1;
  string version = 2;
  repeated CredentialDecl credentials = 3;
  repeated TunnelDecl tunnels = 4;
  repeated EndpointDecl endpoints = 5;
  repeated FacetDecl facets = 6;
  // capabilities are the low-risk, plugin-declarable permissions the
  // plugin needs (currently just network). The gateway records the
  // approved set in its lockfile (trust-on-first-use) and fails closed
  // with a loud warning if a later version escalates. High-risk grants
  // (host filesystem access, sandbox opt-out) are deliberately NOT
  // declarable here — they are operator-only.
  PluginCapabilities capabilities = 7;
}

message PluginCapabilities {
  NetworkAccess network = 1;
  // egress is the set of upstream targets this plugin needs to dial via
  // the gateway's brokered dial, each "host:port" or "*.suffix.tld:port".
  // Declared by the plugin; the gateway records the approved set in the
  // lockfile (trust-on-first-use) and blocks an upgrade that broadens it.
  repeated string egress = 2;
}

enum NetworkAccess {
  // The plugin only talks to the gateway over its socket; upstream
  // connections go through the gateway's brokered dial.
  NETWORK_NONE = 0;
  // The plugin dials out itself (tunnel plugins; credential plugins
  // that do their own token exchange).
  NETWORK_OUTBOUND = 1;
}

// FacetDecl describes one protocol-family schema the plugin exports.
// The gateway registers a facet.Runtime per declared facet so the
// dashboard's /api/facets surfaces it and rules can compile CEL
// conditions against the declared fields. The facet's name is
// auto-namespaced by the gateway as "<plugin>.<name>".
message FacetDecl {
  string name = 1;
  repeated FacetFieldDecl fields = 2;
}

message FacetFieldDecl {
  string name = 1;
  FacetKind kind = 2;
  string label = 3;
  // optional fields may be omitted from EvaluateAction.action_json.
  // The gateway substitutes a kind-zero value (empty string, empty
  // list, empty map, 0) before CEL evaluation so rule conditions
  // can reference them without `has()` guards.
  bool optional = 4;
}

enum FacetKind {
  FACET_STRING      = 0;
  FACET_STRING_LIST = 1;
  FACET_STRING_MAP  = 2;
  FACET_INT         = 3;
  // FACET_STREAM is a lazy bytes value the plugin offers via a
  // handle in EvaluateAction.streams. The gateway pulls chunks via
  // StreamRead — fully when any endpoint rule references the
  // field, otherwise just enough to log a prefix — and sends
  // StreamCancel when it has what it needs. The plugin sees the
  // cancel and can stop buffering.
  FACET_STREAM      = 4;
}

// Schema is a flat list of attributes the plugin's HCL block accepts.
// Nested blocks are not supported in v1.
message Schema {
  repeated SchemaField fields = 1;
}

message SchemaField {
  string name = 1;
  // type_string is a go-cty type string, e.g. "string", "bool",
  // "number", "list(string)". The gateway decodes the HCL block
  // against this synthesized cty.Object before marshaling to JSON.
  string type_string = 2;
  bool required = 3;
}

message SecretSlotDecl {
  string name = 1;
  string label = 2;
  bool multiline = 3;
  string description = 4;
}

message EnvVarDecl {
  string name = 1;
  string value = 2;
  string description = 3;
}

message OptionalScopeDecl {
  string id = 1;
  string label = 2;
}

message OptionalScopeGroupDecl {
  string title = 1;
  repeated OptionalScopeDecl scopes = 2;
}

message OAuthConfigDecl {
  string client_id = 1;
  string client_secret = 2;
  string auth_url = 3;
  string token_url = 4;
  string device_url = 5;
  string register_url = 6;
  string redirect_uri = 7;
  repeated string scopes = 8;
  string refresh_token = 9;
}

message OAuthIntegrationDecl {
  string type = 1;
  string header = 2;
  string prefix = 3;
  string flow = 4;
  OAuthConfigDecl oauth = 5;
  repeated OptionalScopeGroupDecl optional_scopes = 6;
}

message CredentialMetadata {
  repeated string disambiguators = 1;
  repeated SecretSlotDecl secret_slots = 2;
  repeated EnvVarDecl env_vars = 3;
  OAuthIntegrationDecl oauth = 4;
  bool http_inject = 5;
  // http_transform: the credential rewrites the request method / URL /
  // body via the streaming TransformHTTP RPC, not just headers. Implies
  // http_inject.
  bool http_transform = 6;
}

message CredentialDecl {
  string type_name = 1;
  Schema schema = 2;

  // Declares static capabilities for registration/validation.
  // BuildResponse.credential_metadata may refine instance-specific
  // env vars, slots, and OAuth URLs, but registration-time
  // disambiguators are authoritative for validation.
  repeated string disambiguators = 3;
  bool http_inject = 4;
  // http_transform: the credential rewrites the request method / URL /
  // body via the streaming TransformHTTP RPC. Implies http_inject. Used
  // by credentials that sign over the body (AWS SigV4) or carry the
  // secret in the URL/body (telegram, discord).
  bool http_transform = 5;
}

message TunnelDecl {
  string type_name = 1;
  Schema schema = 2;
}

message EndpointDecl {
  string type_name = 1;
  Schema schema = 2;
  // family is forwarded to *config.Plugin.Family. Plugin endpoints
  // typically declare "stream" so rules can't accidentally target
  // them with http.* / sql.* matchers.
  string family = 3;
  TLSMode tls_mode = 4;
  bool requires_vip = 5;
}

enum TLSMode {
  // No TLS handling on the inbound side. The plugin receives the raw
  // TCP bytes.
  TLS_NONE = 0;
  // Gateway terminates TLS using its CA, then hands the plaintext
  // bytes to the plugin via the HandleConn stream.
  TLS_TERMINATE = 1;
}

message BuildRequest {
  // kind is "credential", "tunnel", or "endpoint".
  string kind = 1;
  string type_name = 2;
  string instance_name = 3;
  // config_json is a JSON object: the HCL block body decoded against
  // the plugin-declared schema, then marshaled via cty/json.
  bytes config_json = 4;
}

message BuildResponse {
  // canonical_json is the plugin's normalized form. The gateway
  // treats it as opaque; it's only forwarded back to the plugin in
  // ConnInit / OpenTunnelRequest.
  bytes canonical_json = 1;
  repeated Diagnostic diagnostics = 2;

  // Used when kind == "credential". Instance-specific metadata
  // derived from config, e.g. region-specific env vars/OAuth URLs.
  CredentialMetadata credential_metadata = 3;
}

message Diagnostic {
  enum Severity {
    ERROR = 0;
    WARNING = 1;
  }
  Severity severity = 1;
  string summary = 2;
  string detail = 3;
}

// =====================================================================
// Credential runtime
// =====================================================================

service Credential {
  // InjectHTTP lets an external credential type participate in the
  // built-in HTTPS endpoint's request-time credential injection path.
  // Header-only: the request body never flows through the plugin.
  rpc InjectHTTP(InjectHTTPRequest) returns (InjectHTTPResponse);

  // TransformHTTP is the streaming superset for credentials that declared
  // http_transform: ones that rewrite the request method / URL / body,
  // not just headers (AWS SigV4 over the body, telegram/discord secrets
  // carried in the URL or body).
  //
  // The gateway sends a TransformHTTPInit, then streams the request body
  // as HTTPBodyChunk frames (ending eof=true). The plugin reads as much
  // as it needs — buffering is the plugin's choice — then sends exactly
  // one TransformHTTPHead (header / method / URL mutations) followed by
  // the transformed body as HTTPBodyChunk frames. The gateway applies the
  // head before forwarding upstream (a body-derived header like a SigV4
  // signature is finalized first), then pipes the plugin's body chunks on
  // to the upstream. A plugin that doesn't touch the body just copies the
  // input chunks straight to its output (no buffering).
  rpc TransformHTTP(stream TransformHTTPUp) returns (stream TransformHTTPDown);
}

message HTTPHeaderValues {
  repeated string values = 1;
}

message InjectHTTPRequest {
  string credential_type_name = 1;
  string credential_instance = 2;
  bytes credential_canonical_json = 3;

  bytes credential_secret = 4;
  map<string, string> credential_extras = 5;

  string method = 6;
  string url = 7;
  string host = 8;
  map<string, HTTPHeaderValues> headers = 9;

  // Optional, capped by gateway. Not required by current external
  // credentials but reserved for future read-only inspection.
  bytes body_prefix = 10;
  bool body_truncated = 11;
}

message HeaderMutation {
  enum Op {
    SET = 0;
    ADD = 1;
    DEL = 2;
  }
  Op op = 1;
  string name = 2;
  repeated string values = 3;
}

message InjectHTTPResponse {
  repeated HeaderMutation headers = 1;

  // Extra runtime-derived sensitive values, such as a gateway-minted
  // short-lived bearer token, that should be redacted from logs if
  // encountered.
  repeated string redactions = 2;
}

// HTTPBodyChunk carries one slice of a request body in either direction
// of TransformHTTP. eof marks the final frame (it may carry data too).
message HTTPBodyChunk {
  bytes data = 1;
  bool eof = 2;
  // trailers ride on the eof frame: the HTTP trailers that follow the
  // body (e.g. gRPC's grpc-status / grpc-message). They are conveyed so
  // the transform never drops them — empty leaves the request's original
  // trailers in place.
  map<string, HTTPHeaderValues> trailers = 3;
}

// TransformHTTPUp is gateway -> plugin: the init, then the request body.
message TransformHTTPUp {
  oneof kind {
    TransformHTTPInit init = 1;
    HTTPBodyChunk body = 2;
  }
}

message TransformHTTPInit {
  string credential_type_name = 1;
  string credential_instance = 2;
  bytes credential_canonical_json = 3;
  bytes credential_secret = 4;
  map<string, string> credential_extras = 5;
  string method = 6;
  string url = 7;
  string host = 8;
  map<string, HTTPHeaderValues> headers = 9;
}

// TransformHTTPDown is plugin -> gateway: exactly one head, then the
// transformed request body.
message TransformHTTPDown {
  oneof kind {
    TransformHTTPHead head = 1;
    HTTPBodyChunk body = 2;
  }
}

message TransformHTTPHead {
  // headers / method / url rewrite the request before it is forwarded.
  repeated HeaderMutation headers = 1;
  optional string method = 2;
  optional string url = 3;
  // redactions: exact derived secret strings to mask from audit samples.
  repeated string redactions = 4;
}

// =====================================================================
// Endpoint runtime
// =====================================================================

service Endpoint {
  // HandleConn is a bidi stream owning one inbound agent connection.
  //
  // Gateway sends ConnInit first, then ConnData frames as bytes arrive
  // from the agent. ConnClose from either side terminates the session.
  //
  // Plugin sends ConnData frames for bytes to write back to the agent,
  // and may interleave ConnEvent messages (audit emits).
  rpc HandleConn(stream ConnMessage) returns (stream ConnMessage);
}

message ConnMessage {
  oneof kind {
    ConnInit       init          = 1;
    ConnData       data          = 2;
    ConnClose      close         = 3;
    ConnEvent      event         = 4;
    EvaluateAction evaluate      = 5;   // plugin -> gateway
    ActionVerdict  verdict       = 6;   // gateway -> plugin
    StreamRead     stream_read   = 7;   // gateway -> plugin
    StreamChunk    stream_chunk  = 8;   // plugin -> gateway
    StreamCancel   stream_cancel = 9;   // gateway -> plugin

    DialUpstreamRequest dial_request = 10;  // plugin -> gateway
    DialUpstreamReply   dial_reply   = 11;  // gateway -> plugin
    DialUpstreamData    dial_data    = 12;  // both directions
    DialUpstreamClose   dial_close   = 13;  // both directions
  }
}

// DialUpstreamRequest asks the gateway to open one upstream
// connection on the plugin's behalf — the brokered-dial path that
// lets endpoint plugins run with no network access of their own.
// The gateway validates the target against the endpoint instance's
// allowed dial set (the agent's original target, the endpoint's
// `hosts`, or the operator-written `dial` list), performs the dial
// (through the endpoint's bound tunnel when one is configured),
// optionally terminates upstream TLS, audits the attempt, and then
// pumps bytes as DialUpstreamData frames keyed by dial_id.
message DialUpstreamRequest {
  // dial_id is plugin-chosen and must be unique within the
  // HandleConn stream; every later frame for this connection
  // carries it.
  string dial_id = 1;
  // network must be "tcp" in v1.
  string network = 2;
  // addr is "host:port".
  string addr = 3;
  // tls asks the gateway to run the upstream TLS client handshake
  // (system roots + the endpoint's TLS configuration) and exchange
  // plaintext with the plugin. Plugins may instead run their own
  // TLS over the byte pipe, but the gateway-terminated form gets
  // real certificate verification for free.
  bool tls = 4;
  // tls_server_name overrides the SNI/verification name; defaults
  // to the host part of addr.
  string tls_server_name = 5;
}

message DialUpstreamReply {
  string dial_id = 1;
  // error is empty on success. On refusal or dial failure it names
  // the cause; the attempt is audited either way.
  string error = 2;
}

message DialUpstreamData {
  string dial_id = 1;
  bytes payload = 2;
}

message DialUpstreamClose {
  string dial_id = 1;
  string reason = 2;
}

// StreamRead asks the plugin for the next chunk of an open stream.
// max_bytes is a hint; the plugin may return fewer bytes per chunk.
message StreamRead {
  string handle = 1;
  uint32 max_bytes = 2;
}

// StreamChunk delivers one chunk of stream data. eof signals that no
// more bytes will follow; the plugin needn't send a final empty
// chunk — eof can ride on the last data-bearing chunk.
message StreamChunk {
  string handle = 1;
  bytes payload = 2;
  bool eof = 3;
}

// StreamCancel tells the plugin the gateway has read everything it
// needs and the plugin can drop its end of the stream. The plugin
// stops reading from its source io.Reader.
message StreamCancel {
  string handle = 1;
}

// EvaluateAction asks the gateway to rule on one structured action
// (a "request" in the policy sense — an SMTP command, a query, an
// API call). The plugin sends the action's facet payload as JSON;
// the gateway runs the matched endpoint's compiled rules + any
// approve chain and replies with an ActionVerdict carrying the
// same call_id so plugins can pipeline concurrent calls.
message EvaluateAction {
  // call_id is plugin-chosen and opaque; the gateway echoes it on
  // the matching ActionVerdict.
  string call_id = 1;
  // facet_name is the namespaced facet name ("<plugin>.<facet>")
  // whose schema action_json conforms to. Must match the endpoint's
  // declared family for the gateway to route through the right
  // CEL environment.
  string facet_name = 2;
  // action_json is a JSON object whose keys match the facet's
  // declared scalar / list / map / int field names. Stream-typed
  // fields appear in `streams` instead.
  bytes action_json = 3;
  // summary is a human-readable one-liner the dashboard / HITL
  // prompt renders to describe what's being decided.
  string summary = 4;
  // streams maps each FACET_STREAM field name to a plugin-chosen
  // handle. The gateway issues StreamRead(handle, max_bytes) until
  // it has what it needs (full when a rule references the field,
  // log-prefix only otherwise) and then StreamCancel(handle).
  map<string, string> streams = 5;
}

message ActionVerdict {
  string call_id = 1;
  string action  = 2;   // "allow" | "deny" | "hitl_allow" | "hitl_deny" | "error"
  string reason  = 3;
  string rule    = 4;   // matched rule name, or "" when no rule fired
}

message ConnInit {
  // Identifies which configured endpoint instance is being handled.
  string endpoint_type_name = 1;
  string endpoint_instance  = 2;
  // canonical_json is the BuildResponse.canonical_json for this
  // endpoint instance — the plugin's own normalized config.
  bytes  endpoint_canonical_json = 3;

  // Per-connection routing context.
  string profile        = 4;
  string peer_ip        = 5;
  string upstream_host  = 6;  // hostname recovered from VIP table
  uint32 dst_port       = 7;

  // Bound credential. credential_secret is the secret material
  // fetched by the gateway just-in-time from its secret store.
  // Empty when the endpoint has no credential. When more than one
  // credential is bound to the endpoint these fields carry the first
  // (declaration order); the full set is in `credentials` below.
  string credential_type_name = 8;
  string credential_instance  = 9;
  bytes  credential_canonical_json = 10;
  bytes  credential_secret    = 11;
  map<string,string> credential_extras = 12;

  // All credentials bound to this endpoint, in declaration order, when
  // the endpoint binds more than one. A plugin that supports
  // multi-credential endpoints selects among these per connection (e.g.
  // the aws plugin picks a base key by the target account). Fields 8-12
  // stay populated with credentials[0] for plugins that read only the
  // single bound credential. Empty when the endpoint has no credential.
  repeated BoundCredential credentials = 16;

  // Bound tunnel (optional, informational). Brokered dials
  // (DialUpstreamRequest) are routed through this tunnel by the
  // gateway automatically.
  string tunnel_type_name = 13;
  string tunnel_instance  = 14;

  // supports_dial_upstream tells the plugin SDK this gateway
  // handles DialUpstreamRequest frames. Old gateways leave it
  // false (they silently drop unknown frames); the SDK fails
  // Conn.DialUpstream fast instead of hanging.
  bool supports_dial_upstream = 15;
}

// BoundCredential is one credential bound to a plugin endpoint. The same
// shape the singular ConnInit.credential_* fields carry, repeated so an
// endpoint can offer several (the plugin chooses which to use).
message BoundCredential {
  string type_name = 1;
  string instance  = 2;
  bytes  canonical_json = 3;
  bytes  secret    = 4;
  map<string,string> extras = 5;
}

message ConnData {
  bytes payload = 1;
}

message ConnClose {
  // optional reason; empty for a clean close.
  string reason = 1;
}

message ConnEvent {
  // action mirrors runtime.ConnEvent.Action: "allow" | "deny" |
  // "hitl_allow" | "hitl_deny" | "error".
  string action  = 1;
  string reason  = 2;
  string verb    = 3;
  string summary = 4;
  int64  bytes_count = 5;
  // facets_json is family-specific metadata. Treated as a JSON
  // object by the gateway and copied to Event.Facets.
  bytes  facets_json = 6;
  // rule, when non-empty, is the CompiledRule.Name the plugin
  // resolved internally. v1 plugins typically leave this empty.
  string rule = 7;
}

// =====================================================================
// Tunnel runtime
// =====================================================================

service Tunnel {
  // OpenTunnel asks the plugin to bring up one tunnel instance.
  // The plugin returns an opaque handle that the gateway uses in
  // subsequent Dial / CloseTunnel calls.
  rpc OpenTunnel(OpenTunnelRequest) returns (OpenTunnelResponse);

  // Dial opens one upstream connection via an open tunnel. Bidi
  // stream pumps bytes between gateway and tunneled upstream.
  rpc Dial(stream DialMessage) returns (stream DialMessage);

  // CloseTunnel tears down a tunnel handle.
  rpc CloseTunnel(CloseTunnelRequest) returns (CloseTunnelResponse);
}

message OpenTunnelRequest {
  string tunnel_type_name = 1;
  string tunnel_instance  = 2;
  bytes  canonical_json   = 3;
  // Optional credential bound to the tunnel.
  bytes  credential_secret = 4;
  map<string,string> credential_extras = 5;
}

message OpenTunnelResponse {
  string handle = 1;
}

message CloseTunnelRequest {
  string handle = 1;
}

message CloseTunnelResponse {}

message DialMessage {
  oneof kind {
    DialInit  init  = 1;
    DialData  data  = 2;
    DialClose close = 3;
  }
}

message DialInit {
  string tunnel_handle = 1;
  string network       = 2;
  string addr          = 3;
}

message DialData {
  bytes payload = 1;
}

message DialClose {
  string reason = 1;
}

// =====================================================================
// Host services (gateway-served; the plugin is the client)
// =====================================================================
//
// Unlike every other service here, HostState is implemented by the
// GATEWAY and called by the plugin. The plugin reaches it over the
// go-plugin broker (a side stream of the main connection) on a fixed
// reserved stream id, so it is available to every plugin RPC — unary
// Build / InjectHTTP as well as the HandleConn / Dial streams — not
// just to one connection.

// HostState is a persistent, per-plugin byte store. It lets a sandboxed
// plugin remember opaque bytes across restarts (SSH host keys, signing
// material, a dynamic client_id) without a writable filesystem. The
// gateway namespaces every entry by the calling plugin, so one plugin
// can never read or write another's keys; the namespace is gateway-
// assigned, never sent by the plugin.
service HostState {
  // Get returns the stored value for key, or found=false.
  rpc Get(StateGetRequest) returns (StateGetResponse);
  // Put stores value under key, overwriting any previous value.
  rpc Put(StatePutRequest) returns (StatePutResponse);
}

message StateGetRequest {
  string key = 1;
}

message StateGetResponse {
  bytes value = 1;
  bool found = 2;
}

message StatePutRequest {
  string key = 1;
  bytes value = 2;
}

message StatePutResponse {}
