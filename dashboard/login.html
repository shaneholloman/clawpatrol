<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Log in — Claw Patrol</title>
    <link rel="icon" type="image/svg+xml" href="/claw-patrol-icon.svg" />
    <style>
      /* ── Minimal subset of the dashboard's design tokens ─────────
         Only the values used on this page; mirrors dashboard/src/index.css.
         IBM Plex Sans (variable) is the only family loaded here —
         keeps the login bundle small. */
      @font-face {
        font-family: "IBM Plex Sans";
        font-style: normal;
        font-weight: 100 700;
        font-display: swap;
        src: url("/fonts/ibm-plex-sans/IBMPlexSans-Variable--latin_basic.woff2") format("woff2");
      }

      :root {
        --color-canvas: #fbf8f1;
        --color-canvas-light: #ffffff;
        --color-navy: #1f2a44;
        --color-navy-100: #d6dde9;
        --color-navy-900: #0a0f1c;
        --color-rust: #d8531c;
        --color-rust-300: #f29e5a;
        --color-text: #2c2e35;
        --color-text-muted: #62656d;
        --color-text-subtle: #82838c;
        --color-danger: #a83232;
        --font-sans: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--color-canvas);
        color: var(--color-text);
        font: 14px/1.5 var(--font-sans);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 24px;
      }

      .logo {
        height: 56px;
        width: auto;
      }

      form {
        background: var(--color-canvas-light);
        border: 2px solid var(--color-navy);
        padding: 24px;
        width: 100%;
        max-width: 360px;
      }

      h1 {
        font-family: var(--font-sans);
        font-size: 24px;
        font-weight: 700;
        margin: 0 0 16px;
        letter-spacing: -0.01em;
        color: var(--color-text);
      }

      label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-navy);
        margin: 0 0 6px;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 2px solid var(--color-navy);
        background: var(--color-canvas-light);
        color: var(--color-text);
        font: 14px/1.5 var(--font-sans);
        outline: none;
      }
      input:focus {
        outline: 2px solid var(--color-rust);
        outline-offset: 2px;
      }

      button {
        margin-top: 16px;
        width: 100%;
        padding: 8px 16px;
        background: var(--color-rust);
        color: var(--color-navy-900);
        border: 2px solid var(--color-navy);
        font: 14px/1.5 var(--font-sans);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }
      button:hover {
        background: var(--color-rust-300);
      }
      button:focus-visible {
        outline: 2px solid var(--color-rust);
        outline-offset: 2px;
      }

      .err {
        color: var(--color-danger);
        font-size: 12px;
        margin: 0 0 12px;
      }

      .hint {
        color: var(--color-text-muted);
        font-size: 13px;
        margin: 0 0 16px;
      }
    </style>
  </head>
  <body>
    <img src="/claw-patrol-logo.svg" alt="Claw Patrol" class="logo" />
    <form method="POST" action="/__login?next={{.Next}}">
      {{if .FirstRun}}
      <h1>Set dashboard password</h1>
      <p class="hint">
        Claw Patrol has no operator yet. Pick a password — it will be required to reach the
        dashboard and the management API from now on.
      </p>
      {{if .Error}}
      <p class="err">{{.Error}}</p>
      {{end}}
      <label for="password">New password</label>
      <input id="password" type="password" name="password" autofocus required minlength="12" />
      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" name="confirm" required minlength="12" />
      <button type="submit">Set password</button>
      {{else}}
      <h1>Log in</h1>
      {{if .Error}}
      <p class="err">{{.Error}}</p>
      {{end}}
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autofocus required />
      <button type="submit">Unlock</button>
      {{end}}
    </form>
  </body>
</html>
