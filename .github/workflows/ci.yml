name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd www && npm ci && npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}-
            go-${{ runner.os }}-
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd www && npm ci && npm run format:check && npm run lint:github && npm run build
      - run: gofmt -l . && test -z "$(gofmt -l .)"
      - run: go test ./...
      - name: validate landing-page HCL examples
        run: |
          go build -o /tmp/clawpatrol .
          for f in site/examples/*.hcl; do
            echo "validating $f"
            /tmp/clawpatrol validate "$f"
          done
