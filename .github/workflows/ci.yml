name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}-
            go-${{ runner.os }}-
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod', 'go.sum') }}-
            go-${{ runner.os }}-
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: make dashboard
      - run: make fmt-check
      - run: cd dashboard && deno task lint:github
      - run: make test
      - name: validate HCL examples
        run: |
          go build -o /tmp/clawpatrol ./cmd/clawpatrol
          for f in examples/*.hcl; do
            echo "validating $f"
            /tmp/clawpatrol validate "$f"
          done
