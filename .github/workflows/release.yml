name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "version tag (e.g. v0.1.0)"
        required: true
        default: "dev"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { os: linux,  arch: amd64 }
          - { os: linux,  arch: arm64 }
          - { os: darwin, arch: amd64 }
          - { os: darwin, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: build dashboard
        run: |
          cd www
          npm ci --no-audit --no-fund
          npm run build

      - name: build clawpatrol
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          mkdir -p out
          version="${TAG#v}"
          go build \
            -tags ts_omit_identityfederation \
            -ldflags "-s -w -X main.buildVersion=${version} -X main.buildGitSHA=${SHA}" \
            -trimpath \
            -o out/clawpatrol-${{ matrix.os }}-${{ matrix.arch }} .

      - uses: actions/upload-artifact@v4
        with:
          name: clawpatrol-${{ matrix.os }}-${{ matrix.arch }}
          path: out/clawpatrol-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 7

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build + sign + notarize Clawpatrol.app
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_APP: ${{ secrets.APPLE_PROVISIONING_PROFILE_APP }}
          APPLE_PROVISIONING_PROFILE_EXT: ${{ secrets.APPLE_PROVISIONING_PROFILE_EXT }}
        run: .github/scripts/build-macos-app.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: macos-app
          path: macos/Clawpatrol.app.tar.gz
          retention-days: 7

  publish:
    needs: [build, macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create checksums
        run: |
          cd artifacts
          (sha256sum clawpatrol-* Clawpatrol.app.tar.gz 2>/dev/null > SHA256SUMS \
            || sha256sum clawpatrol-* > SHA256SUMS)

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/clawpatrol-* \
            artifacts/SHA256SUMS
          if [ -f artifacts/Clawpatrol.app.tar.gz ]; then
            gh release upload "${TAG}" artifacts/Clawpatrol.app.tar.gz
          fi
